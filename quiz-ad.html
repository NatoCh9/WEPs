<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>How WEPs-Aware Are You? — 60-Second Quiz</title>
<meta name="description" content="Test your knowledge of the UN Women's Empowerment Principles in 60 seconds, then send the result to your CEO.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<!-- Google Analytics (GA4) — replace G-XXXXXXX with your real Measurement ID before launch -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXX"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){ dataLayer.push(arguments); }
  gtag('js', new Date());
  gtag('config', 'G-XXXXXXX');
</script>

<style>
  :root{
    --navy:#1b2440;
    --navy-dark:#121a30;
    --coral:#ff6f4d;
    --coral-dark:#e5573a;
    --teal:#0ea5a0;
    --bg-alt:#f1efe9;
    --border:#e4e1da;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    min-height:100vh;
    font-family:'Inter',system-ui,sans-serif;
    background:linear-gradient(160deg,var(--navy) 0%,var(--navy-dark) 100%);
    color:#fff;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:24px;
  }
  h1,h2{font-family:'Manrope',sans-serif;line-height:1.2;margin:0 0 .4em;}
  .wrap{width:100%;max-width:420px;}
  .badge{
    display:inline-block;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);
    padding:6px 14px;border-radius:999px;font-size:.75rem;font-weight:700;letter-spacing:.04em;
    text-transform:uppercase;color:var(--coral);margin-bottom:14px;
  }
  .box{
    background:#fff;color:#1a1a1a;border-radius:20px;padding:28px 24px;
    box-shadow:0 24px 60px rgba(0,0,0,.35);
  }
  .intro{text-align:center;}
  .intro h1{font-size:1.5rem;color:var(--navy);}
  .intro p{color:#5a5f6d;font-size:.95rem;margin-bottom:22px;}
  .btn{
    display:inline-flex;align-items:center;justify-content:center;gap:8px;
    padding:14px 22px;border-radius:999px;font-weight:700;font-size:.95rem;
    text-decoration:none;cursor:pointer;border:none;width:100%;
  }
  .btn-primary{background:var(--coral);color:#fff;}
  .btn-primary:hover{background:var(--coral-dark);}
  .btn-outline{background:transparent;border:2px solid var(--navy);color:var(--navy);margin-top:10px;}
  .quiz-meta{display:flex;justify-content:space-between;font-size:.75rem;color:#5a5f6d;font-weight:600;margin-bottom:8px;}
  .quiz-progress{height:6px;background:var(--bg-alt);border-radius:99px;overflow:hidden;margin-bottom:20px;}
  .quiz-progress-bar{height:100%;background:var(--coral);width:0%;transition:width .3s ease;}
  #quiz-question{font-size:1.1rem;font-weight:700;margin-bottom:16px;color:var(--navy);}
  .quiz-options{display:flex;flex-direction:column;gap:8px;}
  .quiz-option{
    text-align:left;padding:12px 14px;border-radius:10px;border:2px solid var(--border);
    background:#fff;font-size:.9rem;font-family:inherit;cursor:pointer;color:#1a1a1a;
  }
  .quiz-option:hover{border-color:var(--coral);}
  .quiz-option.correct{border-color:var(--teal);background:#e8f8f6;}
  .quiz-option.wrong{border-color:var(--coral-dark);background:#fdeae6;}
  .quiz-feedback{margin-top:12px;padding:12px 14px;border-radius:10px;background:var(--bg-alt);font-size:.85rem;display:none;color:#333;}
  .quiz-feedback.show{display:block;}
  .quiz-next{margin-top:16px;}
  .hidden{display:none !important;}
  .result{text-align:center;}
  .result .tier{font-size:1.4rem;font-weight:800;color:var(--navy);}
  .result .score{color:#5a5f6d;margin-bottom:14px;font-size:.9rem;}
  .result p.message{color:#333;font-size:.92rem;margin-bottom:20px;}
  .foot-link{
    display:block;text-align:center;margin-top:18px;font-size:.8rem;color:rgba(255,255,255,.7);
  }
  .foot-link a{color:#fff;font-weight:700;}
</style>
</head>
<body>

<div class="wrap">
  <div class="badge">60-second quiz</div>

  <div class="box">
    <!-- START -->
    <div id="quiz-start" class="intro">
      <h1>How WEPs-aware are you?</h1>
      <p>5 quick questions on the UN Women's Empowerment Principles. Most people score lower than they think.</p>
      <button class="btn btn-primary" id="quiz-begin">Start the quiz</button>
    </div>

    <!-- PLAY -->
    <div id="quiz-play" class="hidden">
      <div class="quiz-meta">
        <span id="quiz-count">Question 1 of 5</span>
        <span id="quiz-score">Score: 0</span>
      </div>
      <div class="quiz-progress" role="progressbar" aria-label="Quiz progress" aria-valuemin="0" aria-valuemax="100"><div class="quiz-progress-bar" id="quiz-bar"></div></div>
      <div id="quiz-question"></div>
      <div class="quiz-options" id="quiz-options"></div>
      <div class="quiz-feedback" id="quiz-feedback" aria-live="polite"></div>
      <div class="quiz-next">
        <button class="btn btn-outline hidden" id="quiz-next-btn">Next question →</button>
      </div>
    </div>

    <!-- RESULT -->
    <div id="quiz-result" class="result hidden">
      <div class="tier" id="result-tier"></div>
      <div class="score" id="result-score"></div>
      <p class="message" id="result-message"></p>
      <a href="#" id="invite-ceo-btn" class="btn btn-primary" target="_blank" rel="noopener">Invite your CEO</a>
      <button class="btn btn-outline" id="share-score-btn">Share your score</button>
    </div>
  </div>

  <p class="foot-link">Want the full 7 Principles + resources? <a href="index.html" onclick="if(window.gtag){gtag('event','cta_click',{cta:'visit_full_site',location:'quiz_ad'});}">Visit the full site →</a></p>
</div>

<script>
(function(){
  var questions = [
    {
      q: "Who created the Women's Empowerment Principles?",
      options: ["A private HR consultancy", "UN Women & the UN Global Compact", "The World Economic Forum"],
      correct: 1,
      explain: "WEPs was established by UN Women in partnership with the UN Global Compact."
    },
    {
      q: "Roughly how many companies have signed the WEPs CEO Statement of Support?",
      options: ["About 500", "About 3,000", "12,000+"],
      correct: 2,
      explain: "WEPs' own reporting cites nearly 12,000 companies across 160+ countries."
    },
    {
      q: "How much does it cost a company to join WEPs?",
      options: ["It's free", "A one-time $10,000 fee", "1% of annual revenue"],
      correct: 0,
      explain: "Joining WEPs costs nothing — no fee, no minimum spend."
    },
    {
      q: "Which WEPs Principle covers workplace safety & freedom from harassment?",
      options: ["Principle 1: Leadership", "Principle 3: Health, safety & well-being", "Principle 7: Reporting"],
      correct: 1,
      explain: "Principle 3 covers the health, safety, and well-being of all workers."
    },
    {
      q: "Who is required to sign the CEO Statement of Support?",
      options: ["Any employee", "The HR director", "The CEO or highest-ranking equivalent"],
      correct: 2,
      explain: "It must be signed by the company's top decision-maker."
    }
  ];

  var current = 0, score = 0;
  var startEl = document.getElementById('quiz-start');
  var playEl = document.getElementById('quiz-play');
  var resultEl = document.getElementById('quiz-result');
  var qEl = document.getElementById('quiz-question');
  var optsEl = document.getElementById('quiz-options');
  var feedbackEl = document.getElementById('quiz-feedback');
  var nextBtn = document.getElementById('quiz-next-btn');
  var barEl = document.getElementById('quiz-bar');
  var countEl = document.getElementById('quiz-count');
  var scoreEl = document.getElementById('quiz-score');

  document.getElementById('quiz-begin').addEventListener('click', function(){
    startEl.classList.add('hidden');
    playEl.classList.remove('hidden');
    if(window.gtag){ gtag('event', 'quiz_start', { quiz_variant: 'ad_5q' }); }
    renderQuestion();
  });

  function renderQuestion(){
    var item = questions[current];
    qEl.textContent = item.q;
    countEl.textContent = 'Question ' + (current + 1) + ' of ' + questions.length;
    scoreEl.textContent = 'Score: ' + score;
    barEl.style.width = (current / questions.length * 100) + '%';
    feedbackEl.classList.remove('show');
    feedbackEl.textContent = '';
    nextBtn.classList.add('hidden');
    optsEl.innerHTML = '';

    item.options.forEach(function(opt, i){
      var btn = document.createElement('button');
      btn.className = 'quiz-option';
      btn.type = 'button';
      btn.textContent = opt;
      btn.addEventListener('click', function(){ handleAnswer(i, btn); });
      optsEl.appendChild(btn);
    });
  }

  function handleAnswer(i, btnEl){
    var item = questions[current];
    var allBtns = optsEl.querySelectorAll('.quiz-option');
    allBtns.forEach(function(b){ b.disabled = true; });

    if(i === item.correct){
      btnEl.classList.add('correct');
      score++;
    } else {
      btnEl.classList.add('wrong');
      allBtns[item.correct].classList.add('correct');
    }
    scoreEl.textContent = 'Score: ' + score;
    feedbackEl.textContent = (i === item.correct ? 'Correct — ' : 'Not quite — ') + item.explain;
    feedbackEl.classList.add('show');
    nextBtn.classList.remove('hidden');
    if(window.gtag){
      gtag('event', 'quiz_answer', { question_index: current + 1, is_correct: i === item.correct, quiz_variant: 'ad_5q' });
    }
  }

  nextBtn.addEventListener('click', function(){
    current++;
    if(current >= questions.length){
      barEl.style.width = '100%';
      showResult();
    } else {
      renderQuestion();
    }
  });

  function showResult(){
    playEl.classList.add('hidden');
    resultEl.classList.remove('hidden');
    var pct = score / questions.length;
    var tier, message;
    if(pct <= 0.4){
      tier = "WEPs Newcomer";
      message = "You're not alone — most people haven't heard of WEPs either. Forward this to your CEO.";
    } else if(pct <= 0.75){
      tier = "WEPs Aware";
      message = "You know more than most. Time to make it official — invite your CEO to sign.";
    } else {
      tier = "WEPs Champion";
      message = "You clearly get it. Now put your company where your knowledge is.";
    }
    document.getElementById('result-tier').textContent = tier;
    document.getElementById('result-score').textContent = score + ' / ' + questions.length + ' correct';
    document.getElementById('result-message').textContent = message;

    if(window.gtag){
      gtag('event', 'quiz_complete', { quiz_variant: 'ad_5q', score: score, total: questions.length, tier: tier });
    }

    var subject = encodeURIComponent("Should we sign the Women's Empowerment Principles?");
    var body = encodeURIComponent(
      "Hi,\n\nI just scored " + score + "/" + questions.length + " on a quiz about the UN Women's Empowerment Principles (WEPs) — " +
      "a free framework over 12,000 CEOs globally have already signed to advance gender equality at work.\n\n" +
      "Could we look into signing our CEO Statement of Support? It costs nothing and takes minutes.\n\n" +
      "Statement: https://www.weps.org/resource/ceo-statement-support\nMore info: https://www.weps.org/join\n\nThanks!"
    );
    var inviteBtn = document.getElementById('invite-ceo-btn');
    inviteBtn.href = "mailto:?subject=" + subject + "&body=" + body;
    inviteBtn.onclick = function(){
      if(window.gtag){ gtag('event', 'cta_click', { cta: 'invite_ceo', location: 'quiz_ad_result', score: score }); }
    };

    document.getElementById('share-score-btn').onclick = function(){
      if(window.gtag){ gtag('event', 'cta_click', { cta: 'share_score', location: 'quiz_ad_result', score: score }); }
      var shareText = "I scored " + score + "/" + questions.length + " on the WEPs awareness quiz. Think you'd do better?";
      var url = window.location.href.split('#')[0];
      if(navigator.share){
        navigator.share({ title: 'Know WEPs Quiz', text: shareText, url: url }).catch(function(){});
      } else {
        navigator.clipboard.writeText(shareText + ' ' + url).then(function(){
          alert('Copied to clipboard — paste it into your share of choice.');
        }).catch(function(){
          prompt('Copy this to share:', shareText + ' ' + url);
        });
      }
    };
  }
})();
</script>

</body>
</html>
